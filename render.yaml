# Render Blueprint — deploys the PG Finder API from this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pg-finder-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
